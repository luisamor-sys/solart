/* ── LOGIN ── */
#screen-login { min-height: 100vh; display: flex; align-items: center; justixxxxxfy-content: center; padding: 24px 16px; background: linear-gradient(145deg, #1a1a2e 0%, #16213e 60%, #0f3460 100%); }

.login-sub { font-size: 13px; color: #6b7280; text-align: center; margin-bottom: 6px; }
.login-badge { display: flex; align-items: center; justify-content: center; gap: 6px; background: #eff6ff; border: 1px solid #bfdbfe; border-radius: 20px; padding: 4px 12px; font-size: 12px; font-weight: 600; color: #1d4ed8; margin-bottom: 20px; }

.pin-label { font-size: 13px; font-weight: 600; color: #374151; margin-bottom: 10px; }
.pin-dots { display: flex; justify-content: center; gap: 12px; margin-bottom: 16px; }

.pin-teclado { display: grid; grid-template-columns: repeat(3,1fr); gap: 8px; margin-bottom: 16px; }
.pin-key { background: #f3f4f6; border: none; border-radius: 12px; padding: 16px; font-size: 20px; font-weight: 700; color: #1a1a2e; cursor: pointer; text-align: center; transition: all 0.15s; user-select: none; }
.pin-key:hover { background: #e5e7eb; }

.login-error { color: #ef4444; font-size: 13px; text-align: center; margin-bottom: 12px; min-height: 20px; }
.btn-login { width: 100%; padding: 14px; background: #0369a1; color: #fff; border: none; border-radius: 12px; font-size: 16px; font-weight: 700; cursor: pointer; }

.chip-sunwise { background: #ede9fe; color: #6d28d9; }

// Limitador de concurrencia: máximo N llamadas a Bitrix en vuelo a la vez.
// Evita tumbar el límite de peticiones cuando el tablero dispara decenas de golpe.
let _enVuelo = 0;
const _cola = [];
function _gate() {
  return new Promise(res => {
    const intentar = () => {
      if (_enVuelo < 4) { _enVuelo++; res(() => { _enVuelo--; if (_cola.length) _cola.shift()(); }); }
      else _cola.push(intentar);
    };
    intentar();
  });
}

// Reintenta cuando Bitrix responde con límite de peticiones (evita que el
// tablero truene por una ráfaga de llamadas). Espera creciente entre intentos.
async function _conReintento(fn, intentos = 4) {
  const liberar = await _gate();
  try {
    for (let i = 0; i < intentos; i++) {
      let j;
      try { j = await fn(); } catch (e) { if (i === intentos - 1) throw e; await new Promise(r => setTimeout(r, 600 * (i + 1))); continue; }
      const err = String(j?.error || '').toUpperCase();
      if (err.includes('QUERY_LIMIT') || err.includes('OPERATION_TIME_LIMIT') || err.includes('OVERLOAD')) {
        if (i === intentos - 1) return j;
        await new Promise(r => setTimeout(r, 800 * (i + 1)));
        continue;
      }
      return j;
    }
  } finally { liberar(); }
}

async function _conReintentoVIEJO(fn, intentos = 3) {
  for (let i = 0; i < intentos; i++) {
    let j;
    try { j = await fn(); } catch (e) { if (i === intentos - 1) throw e; await new Promise(r => setTimeout(r, 600 * (i + 1))); continue; }
    const err = String(j?.error || '').toUpperCase();
    if (err.includes('QUERY_LIMIT') || err.includes('OPERATION_TIME_LIMIT') || err.includes('OVERLOAD')) {
      if (i === intentos - 1) return j;
      await new Promise(r => setTimeout(r, 800 * (i + 1)));
      continue;
    }
    return j;
  }
}

async function bx(endpoint, params = {}) {
  return _conReintento(async () => {
    const r = await fetch(WEBHOOK + endpoint, {
      method: 'POST', headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify(params)
    });
    return r.json();
  });
}

// Para métodos de tasks que necesitan form-encoded con bracket notation
function _flatten(obj, prefix, out = {}) {
  for (const [k, v] of Object.entries(obj)) {
    const key = prefix ? `${prefix}[${k}]` : k;
    if (Array.isArray(v)) {
      v.forEach((item, i) => {
        if (item !== null && typeof item === 'object') { _flatten(item, `${key}[${i}]`, out); }
        else { out[`${key}[${i}]`] = item; }
      });
    } else if (v !== null && typeof v === 'object') { _flatten(v, key, out); }
    else { out[key] = v; }
  }
  return out;
}
async function bxTask(endpoint, params = {}) {
  const flat = _flatten(params);
  return _conReintento(async () => {
    const body = new URLSearchParams(flat);
    const r = await fetch(WEBHOOK + endpoint, { method: 'POST', body });
    return r.json();
  });
}

function pinKey(k) {
  if (k === 'C') pinActual = '';
  else if (k === 'B') pinActual = pinActual.slice(0,-1);
  else if (pinActual.length < 4) pinActual += k;
  actualizarDots();
  if (pinActual.length === 4) intentarLogin();
}
function actualizarDots() {
  for (let i = 0; i < 4; i++)
    document.getElementById('dot-'+i).classList.toggle('lleno', i < pinActual.length);
  document.getElementById('btn-login').disabled =
    !(pinActual.length === 4 && document.getElementById('sel-usuario').value);
}
function resetPin() { pinActual = ''; actualizarDots(); document.getElementById('login-error').textContent = ''; }

function intentarLogin() {
  const uid = parseInt(document.getElementById('sel-usuario').value);
  if (!uid || pinActual.length < 4) return;
  if (PINES[uid] !== pinActual) {
    document.getElementById('login-error').textContent = 'PIN incorrecto.';
    pinActual = ''; actualizarDots(); return;
  }
  const nombre = document.getElementById('sel-usuario').options[document.getElementById('sel-usuario').selectedIndex].text;
  usuarioActual = { id: uid, nombre, rol: ROLES[uid] };
  localStorage.setItem('solart_user', JSON.stringify(usuarioActual));
  abrirApp();
}

function logout() {
  localStorage.removeItem('solart_user');
  usuarioActual = null; pinActual = ''; actualizarDots();
  document.getElementById('sel-usuario').value = '';
  document.getElementById('login-error').textContent = '';

  document.getElementById('screen-login').style.display = 'flex';

  const eIng = vista === 'ing';
  const eVis = vista === 'visitas';

  document.getElementById('sb-visitas')?.classList.toggle('activo', eVis);
  document.getElementById('sb-director')?.classList.toggle('activo', eDir);
  document.getElementById('mnav-dir')?.classList.toggle('activo', eDir);
  document.getElementById('sb-propuestas-ent')?.classList.toggle('activo', !eIng && !eVis && !eDir);
  document.getElementById('mnav-ing')?.classList.toggle('activo', eIng);
  document.getElementById('mnav-vis')?.classList.toggle('activo', eVis);
  document.getElementById('mnav-ent')?.classList.toggle('activo', !eIng && !eVis && !eDir);
  if (eDir) renderDirector();
  else if (eVis) renderVisitas();
  else if (!eIng) renderVendedor();

    const r = usuarioActual?.rol;

    else if (r === 'ejecutor') renderEjecutor();
    else if (r === 'aprobador') renderAprobador();
    else if (r === 'financiero') renderFinanciero();
    else if (r === 'visitas') renderVisitas();
    else if (r === 'ceo') renderCEO();
    else if (r === 'comercial') renderCEO();
  }
}

async function tareasDelProyecto(filtroExtra = {}) {
  // Cargar todas las tareas del proyecto paginando de 50 en 50
  const SELECT = ['ID','TITLE','DESCRIPTION','DEADLINE','CREATED_DATE','CREATED_BY','RESPONSIBLE_ID','STAGE_ID','GROUP_ID','STATUS','PARENT_ID','UF_TASK_WEBDAV_FILES'];
  let todas = [], start = 0, total = null;
  do {
    const r = await bxTask('tasks.task.list', {
      filter: { GROUP_ID: PROJECT_ID },
      select: SELECT,
      order: { ID: 'ASC' },
      start
    });
    if (!r.result?.tasks) { console.warn('Error paginando:', r); break; }
    todas = todas.concat(r.result.tasks);
    if (total === null) total = r.total ?? r.result.tasks.length;
    start += 50;
  } while (todas.length < total && todas.length < 500);

  console.log('Total tareas cargadas:', todas.length, 'de', total);
  return todas;
}

async function cargarTodosUsuarios() {
  try {
    let start = 0;
    while (true) {
      // Sin filtro de ACTIVE: también necesitamos los nombres de usuarios desactivados
      const r = await bx('user.get', { ADMIN_MODE: 'True', select: ['ID','NAME','LAST_NAME','PERSONAL_MOBILE','LAST_LOGIN'], start });
      const users = r.result || [];
      users.forEach(u => {
        const nombre = [u.NAME, u.LAST_NAME].filter(Boolean).join(' ');
        if (nombre) USER_NAMES[String(u.ID)] = nombre;
        if (u.PERSONAL_MOBILE) USER_PHONES[String(u.ID)] = u.PERSONAL_MOBILE;
        if (u.LAST_LOGIN) USER_LAST_LOGIN[String(u.ID)] = u.LAST_LOGIN;
      });
      if (!r.next) break;
      start = r.next;
    }
  } catch(e) { console.warn('No se pudieron cargar usuarios:', e); }
}

async function resolverGrupoEjecutor(uid) {
  // sonet_group.getlist no disponible en este plan — descubrimos GROUP_ID desde las tareas del usuario
  try {
    const r = await bxTask('tasks.task.list', {
      filter: { RESPONSIBLE_ID: uid, '!STATUS': [5,6] },
      select: ['ID','GROUP_ID'],
      order: { ID: 'desc' },
      start: 0
    });
    const tasks = r.result?.tasks || r.result || [];
    const gid = tasks[0]?.groupId || tasks[0]?.GROUP_ID;
    if (gid) {
      GRUPO_ID_POR_USUARIO[uid] = parseInt(gid);
      console.log(`[grupo] usuario ${uid} → GROUP_ID ${gid}`);
    }
  } catch(e) { console.warn('Error resolviendo grupo ejecutor:', e); }
}

async function cargarResumenDrawer(id) {
  const cont = document.getElementById(`dr-resumen-ap-${id}`);
  if (!cont) return;
  try {
    const r = await bx('task.commentitem.getlist', { TASKID: id, ORDER: { ID: 'DESC' }, FILTER: {} });
    const comments = Array.isArray(r.result) ? r.result : [];
    console.log('[resumen drawer] comentarios:', comments.length, comments.map(c=>c.POST_MESSAGE?.substring(0,60)));
    const msg = extraerResumenDeComentarios(comments);
    if (!msg) { cont.textContent = 'Sin resumen del ejecutor aún.'; cont.style.color='#9ca3af'; return; }
    cont.style.color = '#0c4a6e';
    cont.innerHTML = `<div style="font-size:11px;font-weight:700;color:#9ca3af;text-transform:uppercase;letter-spacing:0.5px;margin-bottom:6px">Resumen del ejecutor</div><div style="white-space:pre-line">${msg}</div>`;
  } catch(e) { console.error('[resumen drawer]', e); cont.textContent = 'No se pudo cargar el resumen.'; }
}

function extraerResumenDeComentarios(comments) {
  // Buscar comentarios con marcador (nuevo o viejo formato)
  const c = comments.find(c => {
    const m = c.POST_MESSAGE || c.postMessage || '';
    return m.includes('🔹 Resumen de') || m.includes('[RESUMEN]');
  });
  if (!c) return null;
  return (c.POST_MESSAGE || c.postMessage || '')
    .replace('[RESUMEN]', '').replace(/^🔹 Resumen de .+?:\n?/, '').trim();
}

// Campo personalizado del resumen — se descubre en runtime
let RESUMEN_FIELD = null;

async function descubrirCampoResumen(tareaId) {
  if (RESUMEN_FIELD !== null) return;
  try {
    const r = await bxTask('tasks.task.get', { taskId: tareaId, select: ['*'] });
    const task = r.result?.task || {};
    const ufFields = Object.entries(task).filter(([k]) => k.startsWith('uf'));
    console.log('[campos UF disponibles en la tarea]', ufFields.map(([k,v]) => `${k}: ${JSON.stringify(v)}`));
    // Buscar campo que contenga "comment" o "resumen" en nombre
    const campo = ufFields.find(([k]) => k.toLowerCase().includes('comment') || k.toLowerCase().includes('resumen') || k.toLowerCase().includes('estado'));
    RESUMEN_FIELD = campo ? campo[0] : 'NONE';
    console.log('[resumen field]', RESUMEN_FIELD);
  } catch(e) { console.warn('[descubrirCampoResumen] Error:', e); RESUMEN_FIELD = 'NONE'; }
}

async function guardarResumenEnTarea(tareaId, autor, texto) {
  // Intentar con campo personalizado UF si existe
  await descubrirCampoResumen(tareaId);
  if (RESUMEN_FIELD && RESUMEN_FIELD !== 'NONE') {
    const ufKey = RESUMEN_FIELD.replace(/([A-Z])/g, '_$1').toUpperCase().replace(/^_/, '');
    await bxTask('tasks.task.update', { taskId: tareaId, fields: { [ufKey]: `${autor}: ${texto}` } });
    return;
  }
  // Fallback: comentario en la tarea (endpoint correcto)
  const r = await bx('task.commentitem.add', {
    TASKID: tareaId,
    FIELDS: { POST_MESSAGE: `🔹 Resumen de ${autor}:\n${texto}` }
  });
  if (r.error) throw new Error(r.error_description || r.error);
}

// Convierte File a base64 puro (sin prefijo data:...)
function fileToBase64(file) {
  return new Promise((resolve, reject) => {
    const reader = new FileReader();
    reader.onload = () => resolve(reader.result.split(',')[1]);
    reader.onerror = reject;
    reader.readAsDataURL(file);
  });
}

// Sube archivos via Disk API y publica el link en comentario de la tarea
async function subirArchivosBase64(tareaId, files, prog) {
  prog.textContent = 'Buscando almacenamiento…';

  const tInfoRes = await bxTask('tasks.task.get', { taskId: tareaId, select: ['GROUP_ID', 'TITLE'] });
  const groupId = tInfoRes.result?.task?.groupId || tInfoRes.result?.task?.GROUP_ID;

  let folderId = null;
  if (groupId) {
    try {
      const sGrp = await bx('disk.storage.getlist', { filter: { ENTITY_TYPE: 'group', ENTITY_ID: groupId } });
      const sg = (sGrp.result || []).find(s => s.ROOT_OBJECT_ID);
      if (sg) { folderId = sg.ROOT_OBJECT_ID; }
    } catch {}
  }
  if (!folderId) {
    const sRes = await bx('disk.storage.getlist', { filter: { ENTITY_TYPE: 'user', ENTITY_ID: 12 } });
    const su = (sRes.result || []).find(s => s.ROOT_OBJECT_ID);
    if (su) { folderId = su.ROOT_OBJECT_ID; }
  }
  if (!folderId) throw new Error('No se encontró almacenamiento en Disk. Verifica permisos.');

  const nuevos = [];
  for (let i = 0; i < files.length; i++) {
    const file = files[i];
    prog.textContent = `Subiendo ${i+1}/${files.length}: ${file.name}…`;
    const b64 = await fileToBase64(file);

    const ts = new Date().toISOString().replace(/[T:.]/g,'-').slice(0,19);
    const parts = file.name.split('.');
    const ext = parts.pop();
    const uniqueName = `${parts.join('.')}_${ts}.${ext}`;
    const upRes = await bx('disk.folder.uploadfile', {
      id: folderId,
      data: { NAME: uniqueName },
      fileContent: b64
    });
    if (upRes.error) throw new Error((upRes.error_description||upRes.error||'').replace(/<[^>]*>/g,''));
    const diskFile = upRes.result;
    if (!diskFile?.ID) throw new Error('Bitrix no devolvió ID del archivo subido.');
    const downloadUrl = diskFile.DOWNLOAD_URL || diskFile.DETAIL_URL || '';

    // Adjuntar el archivo a la tarea como adjunto nativo (UF_TASK_WEBDAV_FILES)
    try {
      prog.textContent = `Adjuntando a la tarea…`;
      const tRes = await bxTask('tasks.task.get', { taskId: tareaId, select: ['UF_TASK_WEBDAV_FILES'] });
      const existing = (tRes.result?.task?.ufTaskWebdavFiles || tRes.result?.task?.UF_TASK_WEBDAV_FILES || []).filter(Boolean);
      // El prefijo "n" indica a Bitrix que es un disk.file nuevo a adjuntar (sin él lo ignora)
      const upd = await bxTask('tasks.task.update', { taskId: tareaId, fields: { UF_TASK_WEBDAV_FILES: [...existing, 'n' + diskFile.ID] } });
      if (upd.error) throw new Error(upd.error_description || upd.error);
    } catch(e) {
      console.warn('[UF attach]', e);
      prog.textContent = `⚠️ Subido a Disk pero no se pudo adjuntar a la tarea: ${e.message}`;
    }

    nuevos.push({ name: file.name, uniqueName, id: diskFile.ID, downloadUrl });
  }

  return nuevos;
}

async function subirArchivosDrawer(tareaId, input, parentTaskId) {
  const files = Array.from(input.files); if (!files.length) return;
  const prog = document.getElementById(`dr-uprog-${tareaId}`);
  prog.classList.add('visible'); prog.textContent = `Preparando…`;
  try {
    const subidos = await subirArchivosBase64(tareaId, files, prog);
    prog.textContent = `✅ ${subidos.length} archivo(s) adjuntado(s)`;
    cargarArchivosTask(tareaId, 'dr-archivos');
    const pdfs = subidos.filter(s => s.name.toLowerCase().endsWith('.pdf'));
    for (const pdf of pdfs) {
      await vincularArchivoADeal(parentTaskId || null, pdf.name, pdf.downloadUrl || '');
    }
  } catch(e) { console.error('[upload drawer]', e); prog.textContent = `Error: ${e.message}`; }
  input.value = '';
  setTimeout(() => prog.classList.remove('visible'), 5000);
}

// Marcadores en descripciones de tareas. NO usar corchetes: Bitrix los trata
// como BBCode (escapa la apertura y elimina el cierre). Texto plano con === sobrevive.
function marcaAbre(tag) { return `===${tag}===`; }
function marcaCierra(tag) { return `===FIN ${tag}===`; }
function rxMarca(tag) {
  return new RegExp(`===${tag}===\\s*([\\s\\S]*?)\\s*===FIN ${tag}===`, 'i');
}
function rxMarcaG(tag) {
  return new RegExp(`\\n*===${tag}===[\\s\\S]*?===FIN ${tag}===`, 'gi');
}
function limpiarUrlBB(u) { return (u||'').replace(/\[\/?url\]/gi,'').trim(); }

  return `data-tip="${id}" onclick="event.stopPropagation();mostrarTipCEO(event)"`;

  } else {
    const grupos = {};
    items.forEach(it => { (grupos[it.y] = grupos[it.y] || []).push(it); });
    const anios = Object.keys(grupos).sort((a,b) => b - a);

        </tr>`).join('')}
      </table>`).join('');
  }
  el.style.display = 'block';
  // Posicionar cerca del cursor sin salirse de la pantalla
  const r = el.getBoundingClientRect();
  let x = e.clientX + 14, yPos = e.clientY + 14;
  if (x + r.width > window.innerWidth - 8) x = Math.max(8, window.innerWidth - r.width - 8);
  if (yPos + r.height > window.innerHeight - 8) yPos = Math.max(8, e.clientY - r.height - 10);
  el.style.left = x + 'px'; el.style.top = yPos + 'px';
}

function abrirWA(userId, tipo, titulo) {
  const nombre = (USER_NAMES[String(userId)] || '').split(' ')[0];

    ? `${saludo}ya se completó tu tarea: "${titulo}" ✅`

function fmtFecha(f) {
  if (!f) return '';
  return new Date(f).toLocaleDateString('es-MX', { day:'2-digit', month:'short' });

function chipStage(stageIdVal) {
  const nombre = Object.keys(STAGES).find(k => STAGES[k] == stageIdVal) || '';
  if (nombre.includes('Especial')) return '<span class="tarea-chip chip-nuevo">Nuevo Especial</span>';
  if (nombre.includes('SUNWISE') || nombre.includes('Sunwise')) return '<span class="tarea-chip chip-sunwise">SUNWISE</span>';
  if (nombre.includes('regresada') || nombre.includes('dependencia resuelta')) return '<span class="tarea-chip chip-regresada">Regresada</span>';
  if (nombre.includes('Ingeniería')) return '<span class="tarea-chip chip-progreso">Ing.</span>';
  if (nombre.includes('Operaciones')) return '<span class="tarea-chip chip-progreso">Op.</span>';
  if (nombre.includes('aprobación') || nombre.includes('aprobacion')) return '<span class="tarea-chip chip-espera">Esperando aprobación</span>';

}

async function cargarSupervisor(tab) {
  const cont = document.getElementById('cont-sup');
  try {
    const sinConfig = !Object.keys(STAGE_IDS_MANUAL).length;
    let tareas = [];

    if (sinConfig) {
      tareas = await tareasDelProyecto();
    } else {
      const stageNames = tab === 'pendientes'
        ? ['Nuevo Especial','Nuevo Validación SUNWISE','Propuestas regresadas o con dependencia resuelta']
        : ['En progreso Ingeniería','En progreso Operaciones'];
      const stageIds = stageNames.map(n => sid(n)).filter(Boolean);
      if (!stageIds.length) { cont.innerHTML = '<div class="empty-msg"><div class="empty-icono">⚠️</div><div class="empty-txt">Etapas no encontradas. Revisa STAGE_IDS_MANUAL.</div></div>'; return; }
      const allTareas = await tareasDelProyecto();
      tareas = allTareas.filter(t => stageIds.includes(String(t.stageId||t.STAGE_ID)));
    }

    // Contar tareas por stageId para diagnóstico
    const stageCount = {};
    tareas.forEach(t => { const s = String(t.stageId||t.STAGE_ID||'0'); stageCount[s] = (stageCount[s]||0)+1; });
    const stageCountStr = Object.entries(stageCount).sort((a,b)=>b[1]-a[1]).map(([id,n])=>`ID ${id}: ${n} tareas`).join('<br>');

    const banner = sinConfig ? `<div style="background:#fef9c3;border:1.5px solid #fde68a;border-radius:10px;padding:12px 14px;margin-bottom:16px;font-size:12px;color:#92400e">
      <strong>⚙️ Diagnóstico de etapas</strong><br>${stageCountStr}
    </div>` : '';

    if (!tareas.length) {
      cont.innerHTML = banner + `<div class="empty-msg"><div class="empty-icono">✅</div><div class="empty-txt">${sinConfig ? 'Sin tareas activas en el proyecto' : (tab==='pendientes'?'Sin propuestas pendientes':'Sin propuestas en proceso')}</div><div class="empty-sub">Todo al día.</div></div>`;
      return;
    }
    // Agrupar por categoría según título
    const categoriaTarea = t => {
      const titulo = (t.title || t.TITLE || '').toLowerCase();
      if (titulo.includes('suministro')) return 'Suministro';
      if (titulo.includes('bess')) return 'BESS';
      if (titulo.includes('fotovoltaico') || titulo.includes(' fv ') || titulo.endsWith(' fv') || titulo.includes('fv ')) return 'Fotovoltaico';
      return 'Otros';
    };
    const ORDEN_CATS = ['Suministro','BESS','Fotovoltaico','Otros'];
    const grupos = {};
    tareas.forEach(t => { const c = categoriaTarea(t); (grupos[c] = grupos[c]||[]).push(t); });

    let html = banner;
    const CAT_STYLE = {
      'Todos':        { icono:'🗂️' },
      'Suministro':   { icono:'📦' },
      'BESS':         { icono:'🔋' },
      'Fotovoltaico': { icono:'☀️' },
      'Otros':        { icono:'📋' },
    };

    // Botones filtro
    const filtrosBtns = ['Todos', ...ORDEN_CATS.filter(c => grupos[c])].map(cat => {
      const n = cat === 'Todos' ? tareas.length : grupos[cat].length;
      const icono = CAT_STYLE[cat]?.icono || '';
      return `<button onclick="filtrarCat('${cat}')" id="fcbtn-${cat}"
        style="display:inline-flex;align-items:center;gap:5px;padding:7px 13px;border-radius:20px;border:2px solid #e5e7eb;background:#fff;font-size:13px;font-weight:700;color:#374151;cursor:pointer;white-space:nowrap;transition:all 0.15s"
        class="fcbtn${cat==='Todos'?' fcbtn-activo':''}">
        ${icono} ${cat} <span style="background:#e5e7eb;color:#374151;font-size:11px;font-weight:800;padding:1px 7px;border-radius:10px" id="fcn-${cat}">${n}</span>
      </button>`;
    }).join('');

    html += `<div style="display:flex;flex-wrap:wrap;gap:8px;margin-bottom:16px">${filtrosBtns}</div>`;

    // Cards agrupadas con data-cat
    ORDEN_CATS.forEach(cat => {
      if (!grupos[cat]) return;
      html += grupos[cat].map(t => `<div class="fc-card" data-cat="${cat}">${cardSupervisor(t, tab, sinConfig).replace(/^<div /, '<div ')}</div>`).join('');
    });
    cont.innerHTML = html;
    if (tab === 'pendientes') cargarCfeTarjetas(tareas);
  } catch (e) { console.error(e); cont.innerHTML = `<div class="empty-msg"><div class="empty-icono">⚠️</div><div class="empty-txt">Error al cargar.</div><div class="empty-sub" style="word-break:break-all;font-size:11px;margin-top:8px">${e?.message||JSON.stringify(e)}</div></div>`; }
}

async function cargarCfeTarjetas(tareas) {
  await Promise.all(tareas.map(async t => {
    const id = t.id || t.ID;
    const el = document.getElementById(`cfe-${id}`);
    if (!el) return;
    try {
      const crmLinks = (t.ufCrmTask || t.UF_CRM_TASK || []);
      const links = (Array.isArray(crmLinks) ? crmLinks : [crmLinks]).map(String);
      const dealId = links.find(s => s.startsWith('D_'))?.replace('D_','');
      if (!dealId) return;
      const dRes = await bx('crm.deal.get', { id: dealId });
      const deal = dRes.result;
      if (!deal) return;
      const recibo = deal.UF_CRM_67A2ED1D67C2B;
      const reciboUrl = recibo?.downloadUrl ? `https://crm-solart.bitrix24.mx${recibo.downloadUrl}` : '';
      const sunwiseRaw = (deal.UF_CRM_67A2ED1D7ADD0 || '').trim();
      const sunwiseUrl = sunwiseRaw && !/^0+$/.test(sunwiseRaw) && sunwiseRaw.startsWith('http')
        ? sunwiseRaw : '';

      const btns = [];
      if (reciboUrl) btns.push(`<a href="${reciboUrl}" target="_blank"
        style="display:inline-flex;align-items:center;gap:6px;background:#0369a1;color:#fff;font-size:12px;font-weight:700;padding:7px 12px;border-radius:8px;text-decoration:none">
        ⚡ Ver recibo CFE
      </a>`);
      else btns.push(`<span style="font-size:11px;color:#9ca3af">⚡ Sin recibo CFE</span>`);

      if (sunwiseUrl) btns.push(`<a href="${sunwiseUrl}" target="_blank"
        style="display:inline-flex;align-items:center;gap:6px;background:#7c3aed;color:#fff;font-size:12px;font-weight:700;padding:7px 12px;border-radius:8px;text-decoration:none">
        ☀️ Ver propuesta SUNWISE
      </a>`);

      el.innerHTML = `<div style="display:flex;flex-wrap:wrap;gap:6px;margin-bottom:4px">${btns.join('')}</div>`;
    } catch {}
  }));
}

// Fecha límite al autorizar: 5 días después de la aprobación de Javier
function deadlineCincoDias() {
  const d = new Date(Date.now() + 5 * 24 * 60 * 60 * 1000);
  d.setHours(18, 0, 0, 0); // vence a las 6pm del quinto día
  const p = n => String(n).padStart(2, '0');
  return `${d.getFullYear()}-${p(d.getMonth()+1)}-${p(d.getDate())}T${p(d.getHours())}:${p(d.getMinutes())}:00`;
}
// La subtarea de Gerardo la crea el robot al mover la etapa; aquí le ponemos
// su fecha límite (+5 días) en cuanto aparece.
async function ajustarDeadlineSubtareas(parentId) {
  await new Promise(r => setTimeout(r, 5000)); // dar tiempo al robot
  try {
    const r = await bxTask('tasks.task.list', {
      filter: { PARENT_ID: parentId, '!STATUS': [5,6] },
      select: ['ID','CREATED_DATE'],
      order: { ID: 'DESC' }
    });
    const ahora = Date.now();
    const nuevas = (r.result?.tasks || []).filter(t => ahora - new Date(t.createdDate).getTime() < 60000);
    for (const t of nuevas) {
      await bxTask('tasks.task.update', { taskId: t.id, fields: { DEADLINE: deadlineCincoDias() } });
    }
  } catch {}
}

async function ejecutarAutorizacion(id) {
  const stageDestino = sid('En progreso Ingeniería');
  if (!stageDestino) { alert('No se encontró la etapa. Recarga.'); return; }
  const btn = document.getElementById(`si-${id}`);
  if (btn) { btn.disabled = true; btn.textContent = 'Moviendo…'; }
  try {
    await bxTask('tasks.task.update', { taskId: id, fields: { STAGE_ID: stageDestino, DEADLINE: deadlineCincoDias() } });
    ajustarDeadlineSubtareas(id); // la subtarea de Gerardo también queda a +5 días
    exitoCard(`card-${id}`, '✅ Autorizado — movido a Ingeniería (vence en 5 días)', '#f0fdf4', '#bbf7d0');
  } catch { alert('Error al mover. Intenta de nuevo.'); cancelarConf(id); }
}

async function moverDep(id, tipo) {

function renderVendedor() {

    <div id="cont-vend"><div class="cargando"><div class="spinner"></div></div></div>`;
  cargarVendedor();

async function cargarVendedor() {
  const cont = document.getElementById('cont-vend');
  try {
    // Buscar tareas padre del proyecto con comentarios de aprobación de Daniel
    const r = await bxTask('tasks.task.list', {
      filter: { '!PARENT_ID': true, '!STATUS': [6], CREATED_BY: usuarioActual.id },
      select: ['ID','TITLE','DEADLINE','STATUS','UF_CRM_TASK','DESCRIPTION'],
      order: { ID: 'desc' }, start: 0
    });
    const tareas = r.result?.tasks || [];
    if (!tareas.length) {
      cont.innerHTML = '<div class="empty-msg"><div class="empty-icono">📭</div><div class="empty-txt">Sin propuestas entregadas aún</div><div class="empty-sub">Aquí aparecerán cuando ingeniería entregue una propuesta aprobada.</div></div>';
      return;
    }
    // Buscar la marca [APROBADA] en la descripción (la deja Daniel al aprobar)
    const propuestas = [];
    for (const t of tareas) {
      const descr = t.description || t.DESCRIPTION || '';
      const m = descr.match(rxMarca('APROBADA'));
      if (!m) continue;
      const lineas = m[1].trim().split('\n').filter(Boolean);
      const fechaAprobacion = lineas.shift() || '';
      // Cada línea de archivo: "nombre||url" — una tarjeta por cada PDF aprobado
      for (const linea of lineas) {
        const [nombre, url] = linea.split('||');
        if (nombre) propuestas.push({ tarea: t, url: limpiarUrlBB(url), nombre: nombre.trim(), fechaAprobacion });
      }
    }

    if (!propuestas.length) {
      cont.innerHTML = '<div class="empty-msg"><div class="empty-icono">📭</div><div class="empty-txt">Sin propuestas entregadas aún</div><div class="empty-sub">Aquí aparecerán cuando ingeniería entregue una propuesta aprobada.</div></div>';
      return;
    }

    // Ordenar: más recientes primero
    propuestas.sort((a,b) => new Date(b.fechaAprobacion) - new Date(a.fechaAprobacion));
    cont.innerHTML = propuestas.map(p => cardVendedor(p)).join('');
  } catch(e) {
    cont.innerHTML = `<div class="empty-msg"><div class="empty-icono">⚠️</div><div class="empty-txt">Error al cargar</div><div class="empty-sub">${e?.message||''}</div></div>`;
  }
}

      bxTask('tasks.task.list', { filter: { ...base, '!STATUS': [5,6] }, select: selTareas, order: { DEADLINE: 'ASC' } }),
      bxTask('tasks.task.list', { filter: { ...base, STATUS: 5 }, select: selTareas, order: { CLOSED_DATE: 'DESC' } })
    ]);
    const tareas = r.result?.tasks || [];
    const completadas = rComp.result?.tasks || [];

    // Cargar títulos de tareas padre en paralelo (de activas y completadas)
    const parentIds = [...new Set([...tareas, ...completadas].map(t => t.parentId||t.PARENT_ID).filter(Boolean))];
    const parentMap = {};
    const parentCreador = {};   // quién creó la tarea principal (el vendedor) → para el WhatsApp
    if (parentIds.length) {
      await Promise.all(parentIds.map(async pid => {
        try {
          const pr = await bxTask('tasks.task.get', { taskId: pid, select: ['ID','TITLE','CREATED_BY'] });

        </div>

        <div id="tab-panel-adhoc" style="display:none">${adhoc.length ? adhoc.map(t => cardEjecutor(t, parentMap, true)).join('') : '<div class="empty-msg"><div class="empty-icono">✅</div><div class="empty-txt">Sin otras tareas</div></div>'}</div>`

// Carga los archivos de la subtarea de Gerardo (Ingeniería) que tiene el mismo padre
// y los muestra en la sección "Insumo de Ingeniería" de la tarjeta de Arturo
async function cargarRefIngenieria(subtareaArthurId, parentTaskId) {
  const el = document.getElementById(`ref-ing-${subtareaArthurId}`);
  if (!el) return;
  try {
    const rows = [];

    // Helper para resolver un ID de archivo (attachedObject o disk.file directo)
    async function resolverYAgregar(fid, tareaId) {
      try {
        const ao = await bx('disk.attachedObject.get', { id: fid });
        if (ao.result?.OBJECT_ID && String(ao.result.ENTITY_ID) === String(tareaId)) {
          const fr = await bx('disk.file.get', { id: ao.result.OBJECT_ID });
          const f = fr.result; if (!f) return;
          const nombre = f.NAME || `Archivo #${ao.result.OBJECT_ID}`;
          const url = f.DOWNLOAD_URL || f.DETAIL_URL || '';
          const ext = (nombre.split('.').pop()||'').toUpperCase();
          const icono = ext==='PDF'?'📕':['PPTX','PPT'].includes(ext)?'📊':['XLSX','XLS'].includes(ext)?'📗':'📄';
          rows.push(`<div class="archivo-item"><span style="font-size:18px">${icono}</span><span class="archivo-nombre" ${url?`onclick="window.open('${url}','_blank')"`:``}>${nombre}</span>${url?`<span style="font-size:11px;color:#6d28d9;flex-shrink:0">↓</span>`:''}</div>`);
          return;
        }
        // Fallback: disk.file directo
        const fr = await bx('disk.file.get', { id: fid });
        if (fr.result) {
          const f = fr.result;
          const nombre = f.NAME || `Archivo #${fid}`;
          const url = f.DOWNLOAD_URL || f.DETAIL_URL || '';
          const ext = (nombre.split('.').pop()||'').toUpperCase();
          const icono = ext==='PDF'?'📕':['PPTX','PPT'].includes(ext)?'📊':'📄';
          rows.push(`<div class="archivo-item"><span style="font-size:18px">${icono}</span><span class="archivo-nombre" ${url?`onclick="window.open('${url}','_blank')"`:``}>${nombre}</span>${url?`<span style="font-size:11px;color:#6d28d9;flex-shrink:0">↓</span>`:''}</div>`);
        }
      } catch {}
    }

    // 1. Archivos de la TAREA PADRE (propuesta principal)
    const parentRes = await bxTask('tasks.task.get', { taskId: parentTaskId, select: ['UF_TASK_WEBDAV_FILES', 'TITLE'] });
    const parentTask = parentRes.result?.task || {};
    const parentUfIds = (parentTask.ufTaskWebdavFiles || parentTask.UF_TASK_WEBDAV_FILES || []).filter(Boolean);
    if (parentUfIds.length) {
      rows.push(`<div style="font-size:11px;font-weight:700;color:#6d28d9;margin:4px 0 2px">📋 Tarea principal</div>`);
      for (const fid of parentUfIds) await resolverYAgregar(fid, parentTaskId);
    }

    // 2. Archivos de la subtarea de Gerardo (Ingeniería) para este mismo padre
    const r = await bxTask('tasks.task.list', {
      filter: { PARENT_ID: parentTaskId, RESPONSIBLE_ID: 86 },
      select: ['ID', 'TITLE', 'UF_TASK_WEBDAV_FILES'],
      start: 0
    });
    const subtareasGerardo = r.result?.tasks || r.result || [];
    for (const sg of subtareasGerardo) {
      const sgId = sg.id || sg.ID;
      const ufIds = (sg.ufTaskWebdavFiles || sg.UF_TASK_WEBDAV_FILES || []).filter(Boolean);
      if (ufIds.length) {
        rows.push(`<div style="font-size:11px;font-weight:700;color:#6d28d9;margin:8px 0 2px">🔧 Ingeniería (Gerardo)</div>`);
        for (const fid of ufIds) await resolverYAgregar(fid, sgId);
      }
    }

    el.innerHTML = rows.length ? rows.join('') : '<div style="font-size:12px;color:#9ca3af">Sin insumo aún.</div>';
  } catch(e) {
    console.error('[refIng]', e);
    el.innerHTML = '<div style="font-size:12px;color:#9ca3af">No se pudo cargar.</div>';
  }
}

async function guardarResumen(tareaId, prefijo) {
  const textarea = document.getElementById(`resumen-${prefijo}-${tareaId}`);
  const msg = document.getElementById(`resumen-msg-${tareaId}`);
  const texto = textarea?.value?.trim();
  if (!texto) { if (msg) { msg.textContent = 'Escribe un resumen antes de guardar.'; msg.classList.add('visible'); setTimeout(()=>msg.classList.remove('visible'),3000); } return; }
  if (msg) { msg.textContent = 'Guardando…'; msg.classList.add('visible'); }
  try {
    const autor = usuarioActual?.nombre || 'Ejecutor';
    await guardarResumenEnTarea(tareaId, autor, texto);
    if (textarea) textarea.value = '';
    if (msg) { msg.textContent = '✅ Resumen guardado'; setTimeout(()=>msg.classList.remove('visible'),3000); }
  } catch(e) { console.error('[resumen]', e); if (msg) { msg.textContent = 'Error al guardar.'; setTimeout(()=>msg.classList.remove('visible'),3000); } }
}

// Cache temporal de archivos subidos por tarea (se limpia al completar)
window._archivosCache = window._archivosCache || {};

async function subirArchivos(tareaId, input, parentTaskId) {
  const files = Array.from(input.files); if (!files.length) return;
  const prog = document.getElementById(`uprog-${tareaId}`);
  prog.classList.add('visible'); prog.textContent = 'Preparando…';
  try {
    const subidos = await subirArchivosBase64(tareaId, files, prog);
    // Guardar en cache para adjuntarlos al enviar a revisión
    if (!window._archivosCache[tareaId]) window._archivosCache[tareaId] = [];
    subidos.forEach(s => window._archivosCache[tareaId].push(s));
    // Mostrar archivos del cache en la sección propuesta final
    const ejEl = document.getElementById(`archivos-ej-${tareaId}`);
    if (ejEl) {
      const todos = window._archivosCache[tareaId] || [];
      ejEl.innerHTML = todos.map(a => {
        const ext = (a.name.split('.').pop()||'').toUpperCase();
        const icono = ext==='PDF'?'📕':['PPTX','PPT'].includes(ext)?'📊':['XLSX','XLS'].includes(ext)?'📗':'📎';
        const isPdf = ext==='PDF';
        return `<div class="archivo-item" style="${isPdf?'border-color:#7c3aed;background:#faf5ff':''}">
          <span class="archivo-icono">${icono}</span>
          <div class="archivo-info">
            <div class="archivo-nombre">${a.name}${isPdf?' <span style="font-size:10px;color:#7c3aed;font-weight:700">PDF</span>':''}</div>
            ${a.downloadUrl?`<a href="${a.downloadUrl}" target="_blank" class="archivo-link">Descargar →</a>`:''}
          </div>
        </div>`;
      }).join('') || '<div style="font-size:12px;color:#9ca3af">Sin archivos aún.</div>';
    }
    prog.textContent = `✅ ${subidos.length} archivo(s) adjuntado(s) — se enviarán al dar click en "Enviar a revisión"`;
  } catch(e) { console.error('[upload]', e); prog.textContent = `Error: ${e.message}`; }
  input.value = '';
  setTimeout(() => prog.classList.remove('visible'), 7000);
}

// Llamado por Daniel al aprobar una propuesta de Arturo
async function aprobarPropuestaArturo(subtareaId, parentTaskId, pdfs) {
  const btn = document.getElementById(`btn-apr-arturo-${subtareaId}`);
  if (btn) { btn.disabled = true; btn.textContent = 'Aprobando…'; }
  try {
    const listaArchivos = pdfs.map(p => `📕 ${p.name}${p.url ? `\n🔗 Descargar: ${p.url}` : ''}`).join('\n\n');
    // 1. Comentario en la tarea principal
    await bx('task.commentitem.add', {
      TASKID: parentTaskId,
      FIELDS: { POST_MESSAGE: `✅ Propuesta${pdfs.length>1?'s':''} aprobada${pdfs.length>1?'s':''} por Daniel González\n\n${listaArchivos}` }
    });
    // 2. Adjuntar los PDFs aprobados a la tarea principal como adjuntos nativos
    //    y marcar la aprobación en la descripción (los comentarios no son legibles por API)
    if (parentTaskId) {
      try {
        const pr = await bxTask('tasks.task.get', { taskId: parentTaskId, select: ['UF_TASK_WEBDAV_FILES','DESCRIPTION'] });
        const pt = pr.result?.task || {};
        const existing = (pt.ufTaskWebdavFiles || pt.UF_TASK_WEBDAV_FILES || []).filter(Boolean);
        const nuevos = pdfs.filter(p => p.fileId).map(p => 'n' + p.fileId);
        let descr = pt.description || pt.DESCRIPTION || '';
        descr = descr.replace(rxMarcaG('APROBADA'), '');
        const hoy = new Date().toISOString().slice(0,10);
        const lineasPdf = pdfs.map(p => `${p.name}||${p.url||''}`).join('\n');
        descr += `\n\n${marcaAbre('APROBADA')}\n${hoy}\n${lineasPdf}\n${marcaCierra('APROBADA')}`;
        await bxTask('tasks.task.update', { taskId: parentTaskId, fields: {
          DESCRIPTION: descr,
          ...(nuevos.length ? { UF_TASK_WEBDAV_FILES: [...existing, ...nuevos] } : {})
        } });
      } catch(e) { console.warn('[aprobar parent]', e); }
    }
    // 3. Timeline del deal CRM — una entrada por cada PDF aprobado
    for (const p of pdfs) {
      await vincularArchivoADeal(parentTaskId, p.name, p.url);
    }
    // 4. Completar la subtarea de Arturo y la tarea principal (status + etapa kanban)
    await bxTask('tasks.task.complete', { taskId: subtareaId });
    if (parentTaskId) {
      await bxTask('tasks.task.complete', { taskId: parentTaskId });
      const stageFin = sid('Terminado');
      if (stageFin) await bxTask('tasks.task.update', { taskId: parentTaskId, fields: { STAGE_ID: stageFin } });
    }
    exitoCard(`card-rev-${subtareaId}`, '✅ Propuesta aprobada y publicada', '#f0fdf4', '#bbf7d0');
  } catch(e) { alert('Error al aprobar: ' + e.message); if (btn) { btn.disabled=false; btn.textContent='Aprobar y publicar'; } }
}

async function ejecutarDevolucion(subtareaId) {
  const motivo = document.getElementById(`motivo-dev-${subtareaId}`)?.value?.trim();
  if (!motivo) { alert('Escribe el motivo de devolución.'); return; }
  const btn = document.getElementById(`btn-dev-${subtareaId}`);
  if (btn) { btn.disabled=true; btn.textContent='Devolviendo…'; }
  try {
    // Comentario en la subtarea con el motivo
    await bx('task.commentitem.add', {
      TASKID: subtareaId,
      FIELDS: { POST_MESSAGE: `🔴 PROPUESTA DEVUELTA\n\nMotivo: ${motivo}\n\n— Daniel González` }
    });
    // Marcar la devolución en la tarea misma (título + descripción) para que
    // la tarjeta de Arturo pueda mostrarla — los comentarios no son legibles por API
    const tr = await bxTask('tasks.task.get', { taskId: subtareaId, select: ['TITLE','DESCRIPTION'] });
    const tk = tr.result?.task || {};
    let titulo = tk.title || tk.TITLE || '';
    let descr = tk.description || tk.DESCRIPTION || '';
    if (!titulo.startsWith('🔴')) titulo = `🔴 DEVUELTA | ${titulo}`;
    // Quitar bloque de devolución anterior si existe y agregar el nuevo
    descr = descr.replace(rxMarcaG('DEVOLUCION'), '');
    const fecha = new Date().toLocaleDateString('es-MX', { day: 'numeric', month: 'short' });
    descr += `\n\n${marcaAbre('DEVOLUCION')}\nDevuelta por Daniel González (${fecha}):\n${motivo}\n${marcaCierra('DEVOLUCION')}`;
    // Regresar a "En progreso" (STATUS 2) con la marca de devolución
    await bxTask('tasks.task.update', { taskId: subtareaId, fields: { STATUS: 2, TITLE: titulo, DESCRIPTION: descr } });
    exitoCard(`card-rev-${subtareaId}`, '↩️ Propuesta devuelta con observaciones', '#fff7ed', '#fed7aa');
  } catch(e) { alert('Error: ' + e.message); if (btn) { btn.disabled=false; btn.textContent='Devolver'; } }
}

function iniciarCompletar(id) {
  const errEl = document.getElementById(`val-ej-${id}`);
  const card = document.getElementById(`card-ej-${id}`);
  const esAdhoc = card?.dataset?.adhoc === 'true';
  const errores = [];
  const comentario = document.getElementById(`resumen-ej-${id}`)?.value?.trim() || '';
  if (esAdhoc) {
    if (!comentario) errores.push('✏️ Agrega un resumen de lo que hiciste — es necesario para que quien creó la tarea pueda aprobarla.');
  } else if (String(usuarioActual?.id) === '86' || String(usuarioActual?.id) === '34') {
    if (!comentario) errores.push(String(usuarioActual?.id) === '86'
      ? '✏️ Escribe un comentario describiendo qué información recopilaste — Arturo lo necesita para elaborar la propuesta.'
      : '✏️ Escribe un comentario con el alcance o aclaraciones de la propuesta para que Daniel pueda revisarla correctamente.');
    const archivosEl = document.getElementById(`archivos-ej-${id}`);
    const tieneArchivos = (archivosEl && archivosEl.querySelector('.archivo-item')) ||
                          (window._archivosCache?.[id]?.length > 0);
    if (!tieneArchivos) errores.push(String(usuarioActual?.id) === '86'
      ? '📎 Adjunta los archivos de ingeniería antes de continuar — son el insumo que Arturo usará para generar la propuesta.'
      : '📎 Adjunta el PDF de la propuesta antes de enviar a revisión — Daniel no puede aprobar sin el archivo.');
  }
  if (errores.length) {

// ── PANEL DIRECTIVO (Victor Linaldi, CEO) ─────────────────────────────────
let _ceoData = null;

// Embudo ACUMULADO (triángulo invertido): cada nivel cuenta a los que llegaron
// AL MENOS hasta ahí. Si un cliente está en evaluación, ya cumplió generación +
// presentación + visita, así que suma en todos los niveles de arriba.
// Niveles del embudo (nivel 0 = prospectos sin recibo, viven en el objeto Lead).
// El prospecto se convierte en negociación (deal) al validar recibo (08_Recibo validado).
const FUNNEL_NIVELES = [
  { d: 0, label: '📇 Prospecto captado', leads: true },
  { d: 1, label: '🧾 Recibo validado' },
  { d: 2, label: '🤝 Propuesta presentada' },
  { d: 3, label: '🧭 Visita técnica' },
  { d: 4, label: '💬 Negociación' },
  { d: 5, label: '📄 En cierre' },
  { d: 6, label: '🏆 Ganada' },
];
// Profundidad del DEAL en el embudo (1=recibo … 6=ganada)
const STAGE_DEPTH = {
  'PREPARATION': 1, 'NEW': 1,                              // recibo validado (generación/preliminar)
  'PREPAYMENT_INVOICE': 2,                                 // propuesta presentada
  'EXECUTING': 3,                                          // visita técnica
  'UC_OF6DF0': 4, 'FINAL_INVOICE': 4, 'UC_YTJ3M5': 4,     // negociación (formal/evaluación/financiera)
  'UC_Y3LUYS': 4, 'UC_ODYVCM': 4, 'UC_LARNFI': 4, 'UC_60SZCS': 4, 'UC_Y71AO6': 4, // sí verbal
  'WON': 5
};
function depthDeal(x) {
  const st = x.STAGE_ID || '';
  if (st.indexOf('C2:') === 0) return st === 'C2:WON' ? 6 : 5;                 // cierre / ganada
  if (st.indexOf('C4:') === 0 || st.indexOf('C6:') === 0) return 6;           // instalación/entrega = ganada
  return STAGE_DEPTH[st] || 1;                                                 // recibo por defecto
}
const MESES_CORTOS = ['Ene','Feb','Mar','Abr','May','Jun','Jul','Ago','Sep','Oct','Nov','Dic'];
function fmtMXN(n) {
  if (n >= 1000000) return '$' + (n/1000000).toFixed(1) + ' M';
  if (n >= 1000) return '$' + Math.round(n/1000) + ' mil';
  return '$' + Math.round(n).toLocaleString('es-MX');
}

async function cargarCEO() {
  const cont = document.getElementById('cont-ceo');
  try {
    if (!_ceoData) {
      // Deals de todos los pipelines relevantes. Un deal "ganado en ventas" avanza
      // al pipeline de cierre (cat 2); al pagar anticipo pasa a instalación (4) y entrega (6).
      async function todosLosDeals(cat) {
        let deals = [], start = 0;
        while (true) {
          const r = await bx('crm.deal.list', {
            filter: { CATEGORY_ID: cat },
            select: ['ID','TITLE','OPPORTUNITY','ASSIGNED_BY_ID','STAGE_ID','CLOSEDATE','DATE_CREATE','MOVED_TIME','DATE_MODIFY','LAST_ACTIVITY_TIME',
                     'UF_CRM_1741208352117','UF_CRM_1753209254287','UF_CRM_1765995370491'],
            start
          });
          (r.result || []).forEach(x => { x._cat = cat; deals.push(x); });
          if (!r.next) break;
          start = r.next;
        }
        return deals;
      }
      async function todasLasTareas(filtro) {
        let ts = [], start = 0;
        while (true) {
          const r = await bxTask('tasks.task.list', {
            filter: filtro,
            select: ['ID','TITLE','STATUS','RESPONSIBLE_ID','CREATED_BY','CREATED_DATE','CHANGED_DATE'],
            start
          });
          const pagina = r.result?.tasks || [];
          ts = ts.concat(pagina);
          if (!r.next || !pagina.length || ts.length >= 2000) break;
          start = r.next;
        }
        return ts;
      }
      // Deals con actividad registrada en los últimos 30 días (Bitrix no refresca
      // LAST_ACTIVITY_TIME con los to-dos, así que se consulta el timeline directo)
      async function dealsConActividad30d() {
        const desde = new Date(Date.now() - 30*86400000).toISOString().slice(0,19);
        const ids = new Set();
        let start = 0;
        while (true) {
          const r = await bx('crm.activity.list', {
            filter: { OWNER_TYPE_ID: 2, '>=CREATED': desde },
            select: ['ID','OWNER_ID'], start
          });
          (r.result || []).forEach(a => ids.add(String(a.OWNER_ID)));
          if (!r.next) break;
          start = r.next;
        }
        // También cuentan las tareas ligadas al deal con movimiento reciente
        let startT = 0;
        while (true) {
          const rt = await bxTask('tasks.task.list', {
            filter: { '>=CHANGED_DATE': desde },
            select: ['ID','UF_CRM_TASK'],
            start: startT
          });
          const pag = rt.result?.tasks || [];
          pag.forEach(t => (t.ufCrmTask || []).forEach(u => {
            const m = String(u).match(/^D_(\d+)$/);
            if (m) ids.add(m[1]);
          }));
          if (!rt.next || !pag.length) break;
          startT = rt.next;
        }
        return ids;
      }
      // Prospectos = leads (sin recibo CFE); al entregarlo se convierten en negociación
      async function todosLosLeads() {
        let ls = [], start = 0;
        while (true) {
          const r = await bx('crm.lead.list', { select: ['ID','STATUS_ID','DATE_CREATE','ASSIGNED_BY_ID'], start });
          ls = ls.concat(r.result || []);
          if (!r.next) break;
          start = r.next;
        }
        return ls;
      }
      const [leadsArr, actIds] = await Promise.all([todosLosLeads(), dealsConActividad30d()]);
      const [d0, d2, d4, d6, tIng34, tIng86, tFin, tVis, tSolicitudes] = await Promise.all([
        todosLosDeals(0), todosLosDeals(2), todosLosDeals(4), todosLosDeals(6),
        todasLasTareas({ '%TITLE': 'propuesta', RESPONSIBLE_ID: 34 }),
        todasLasTareas({ '%TITLE': 'propuesta', RESPONSIBLE_ID: 86 }),
        todasLasTareas({ GROUP_ID: 30 }),
        todasLasTareas({ '%TITLE': 'VISITA T' }),
        // Todas las solicitudes de propuesta activas (tareas padre creadas por vendedores)
        todasLasTareas({ '%TITLE': 'propuesta', '!STATUS': [5,6] })
      ]);
      const noPerdido = x => !String(x.STAGE_ID).endsWith('LOSE');
      _ceoData = {
        // Prospectos = pipeline de ventas activo
        abiertos: d0.filter(x => x.STAGE_ID !== 'LOSE'),
        perdidos: d0.filter(x => x.STAGE_ID === 'LOSE'),
        // En cierre = ganadas comercialmente, trabajando el contrato/anticipo
        enCierre: d2.filter(x => noPerdido(x) && x.STAGE_ID !== 'C2:WON'),
        // Ganadas = pagaron anticipo o ya avanzaron a instalación/entrega
        ganadas: [...d2.filter(x => x.STAGE_ID === 'C2:WON'), ...d4.filter(noPerdido), ...d6.filter(noPerdido)],
        tIng: [...tIng34, ...tIng86], tFin, tVis, tSolicitudes,
        leadsArr, actIds
      };
      // Etiquetar el estado actual de cada deal para el análisis por cohorte
      _ceoData.abiertos.forEach(x => x._estado = 'abierto');
      _ceoData.perdidos.forEach(x => x._estado = 'perdido');
      _ceoData.enCierre.forEach(x => x._estado = 'cierre');
      _ceoData.ganadas.forEach(x => x._estado = 'ganada');
      _ceoData.dealsAll = [..._ceoData.abiertos, ..._ceoData.perdidos, ..._ceoData.enCierre, ..._ceoData.ganadas];
    }
    pintarCEO();
  } catch(e) { console.error('[ceo]', e); cont.innerHTML = '<div class="empty-msg"><div class="empty-icono">⚠️</div><div class="empty-txt">Error al cargar el panel.</div><div style="font-size:12px;color:#9ca3af;margin-top:6px">Recarga la página; si persiste, avísale a Luis.</div></div>'; }
}

function pintarCEO() {
  const cont = document.getElementById('cont-ceo');
  const anioVal = document.getElementById('ceo-anio')?.value || String(new Date().getFullYear());
  const esTodo = anioVal === 'todo';
  const anioSel = esTodo ? null : (parseInt(anioVal) || new Date().getFullYear());
  const etiquetaPeriodo = esTodo ? 'histórico completo' : anioSel;
  // Filtro por vendedor: solo sus negociaciones/prospectos
  const vendSel = document.getElementById('ceo-vend')?.value || 'todos';
  const fv = arr => vendSel === 'todos' ? arr : (arr || []).filter(x => String(x.ASSIGNED_BY_ID) === vendSel);
  // Filtro por etapa: negociaciones actualmente en ese nivel del embudo (los leads no tienen etapa)
  const etapaSel = document.getElementById('ceo-etapa')?.value || 'todas';
  const fe = arr => etapaSel === 'todas' ? arr : (arr || []).filter(x => String(depthDeal(x)) === etapaSel);
  const fvd = arr => fe(fv(arr)); // vendedor + etapa para arrays de deals
  const d = {
    ..._ceoData,
    leadsArr: fv(_ceoData.leadsArr),   // prospectos: solo filtro de vendedor
    dealsAll: fvd(_ceoData.dealsAll),
    abiertos: fvd(_ceoData.abiertos),
    enCierre: fvd(_ceoData.enCierre),
    ganadas:  fvd(_ceoData.ganadas),
    perdidos: fvd(_ceoData.perdidos),
  };
  // Lista de vendedores para el selector (todos los que tienen deals o prospectos)
  const vendSet = {};
  [..._ceoData.dealsAll, ..._ceoData.leadsArr].forEach(x => {
    const id = String(x.ASSIGNED_BY_ID || '');
    if (id && id !== '0' && id !== '50') vendSet[id] = USER_NAMES[id] || `Usuario ${id}`;
  });
  const vendOpciones = Object.entries(vendSet).sort((a,b) => a[1].localeCompare(b[1]));

  // ── Facturación: ganadas por año/mes/vendedor ──
  // Fecha de la venta ≈ cuándo llegó a su etapa actual (MOVED_TIME), o cierre/creación
  const fechaDeal = x => new Date(x.MOVED_TIME || x.CLOSEDATE || x.DATE_CREATE);
  const ganadasVentas = d.ganadas;   // ya pasaron cierre (anticipo pagado o más allá)
  const ganadasCierre = d.enCierre;  // en proceso de cierre
  const aniosSet = new Set([new Date().getFullYear()]);
  [...ganadasVentas, ...ganadasCierre].forEach(x => { const y = fechaDeal(x).getFullYear(); if (y > 2000) aniosSet.add(y); });
  d.dealsAll.forEach(x => { const y = new Date(x.DATE_CREATE).getFullYear(); if (y > 2000) aniosSet.add(y); });
  d.leadsArr.forEach(l => { const y = new Date(l.DATE_CREATE).getFullYear(); if (y > 2000) aniosSet.add(y); });
  const anios = [...aniosSet].sort((a,b)=>b-a);

  const delAnio = arr => esTodo ? arr : arr.filter(x => fechaDeal(x).getFullYear() === anioSel);
  const vAnio = delAnio(ganadasVentas), cAnio = delAnio(ganadasCierre);
  const suma = arr => arr.reduce((s,x) => s + (parseFloat(x.OPPORTUNITY)||0), 0);
  const totalVentas = suma(vAnio), totalCierre = suma(cAnio);

  // ── Hitos del proceso comercial (cohorte del periodo) ──
  const anioDe = f => new Date(f).getFullYear();
  const leadsAnio = esTodo ? d.leadsArr : d.leadsArr.filter(l => anioDe(l.DATE_CREATE) === anioSel);
  // Prospecto sin recibo = lead activo (no validado, no descartado)
  const prospectosSinRecibo = leadsAnio.filter(l => l.STATUS_ID !== 'CONVERTED' && l.STATUS_ID !== 'JUNK');
  // Deals del periodo: cada deal nació al validar recibo (08_Recibo validado)
  const cohorteAll = esTodo ? d.dealsAll : d.dealsAll.filter(x => anioDe(x.DATE_CREATE) === anioSel);
  const cohVivas = cohorteAll.filter(x => x._estado !== 'perdido');   // activas + ganadas
  const cohPerdidas = cohorteAll.filter(x => x._estado === 'perdido');
  const cohorte = cohVivas;                                          // alias para tabla/detalles
  const conReciboN = cohorteAll.length;                              // todo deal = recibo validado
  const cohNegociacion = cohVivas.filter(x => depthDeal(x) >= 4);    // post-visita (negociación real)
  const cohCierre = cohVivas.filter(x => depthDeal(x) === 5);        // en cierre (sin ganar aún)
  const cohGanadas = cohVivas.filter(x => depthDeal(x) === 6);       // ganada
  const llegaronACierre = cohCierre.length + cohGanadas.length;      // depth >= 5
  const nNeg = cohNegociacion.length, nCie = cohCierre.length, nGan = cohGanadas.length;
  // Proyectos chicos (<100 kWp): se muestran aparte, no cuentan para metas
  const esChica = x => { const k = parseFloat(x.UF_CRM_1741208352117); return !!k && k < 100; };
  const ganGrandes = cohGanadas.filter(x => !esChica(x));
  const ganChicas = cohGanadas.filter(esChica);
  // Conversiones: cada flecha = siguiente / actual
  const totalPros = prospectosSinRecibo.length + conReciboN;
  const convProspecto = totalPros ? Math.round(conReciboN / totalPros * 100) : 0;
  const convReciboNeg = conReciboN ? Math.round(nNeg / conReciboN * 100) : 0;
  const convVentaCierre = nNeg ? Math.round(llegaronACierre / nNeg * 100) : 0;
  const convCierreGanado = llegaronACierre ? Math.round(nGan / llegaronACierre * 100) : 0;
  const tasaPerdida = conReciboN ? Math.round(cohPerdidas.length / conReciboN * 100) : 0;

  // ── Tabla por vendedor: hitos del embudo (mismos que la tira, acumulados) ──
  const porVend = {};
  const grp = id => {
    id = String(id || '');
    if (!id || id === '0' || id === '50') return null;   // 50 = usuario eliminado
    return porVend[id] = porVend[id] || { leadsN: 0, conRecibo: [], negociacion: [], cierre: [], ganadas: [], ganChicas: [] };
  };
  prospectosSinRecibo.forEach(l => { const g = grp(l.ASSIGNED_BY_ID); if (g) g.leadsN++; });
  cohorteAll.forEach(x => { const g = grp(x.ASSIGNED_BY_ID); if (g) g.conRecibo.push(x); });
  cohVivas.forEach(x => {
    const g = grp(x.ASSIGNED_BY_ID); if (!g) return;
    const dp = depthDeal(x);
    if (dp >= 4) g.negociacion.push(x);                  // post-visita (acumulado)
    if (dp >= 5) g.cierre.push(x);                        // cierre + ganadas
    if (dp >= 6) (esChica(x) ? g.ganChicas : g.ganadas).push(x);
  });
  // Prospectos por mes por vendedor (detalle al pasar el mouse)
  const leadsMesVend = {};
  prospectosSinRecibo.forEach(l => {
    const id = String(l.ASSIGNED_BY_ID);
    (leadsMesVend[id] = leadsMesVend[id] || Array(12).fill(0))[new Date(l.DATE_CREATE).getMonth()]++;
  });
  const detMeses = id => {
    const m = leadsMesVend[id]; if (!m) return [];
    return m.map((n,i) => n ? `${MESES_CORTOS[i]}: ${n} prospecto${n>1?'s':''}` : null).filter(Boolean);
  };
  const tablaVend = Object.entries(porVend)
    .map(([id, v]) => ({
      id, nombre: USER_NAMES[id] || `Usuario ${id}`, detMeses: detMeses(id),
      leads: v.leadsN, conRecibo: v.conRecibo, neg: v.negociacion, cie: v.cierre, gan: v.ganadas, ganC: v.ganChicas
    }))
    .sort((a,b) => (b.gan.length - a.gan.length) || (b.cie.length - a.cie.length) || (b.neg.length - a.neg.length) || (b.conRecibo.length - a.conRecibo.length) || (b.leads - a.leads));
  // Desglose de las ganadas por pipeline actual
  const PIPE_NOMBRE = { 2: '📄 Cerrando contrato', 4: '🔨 En instalación', 6: '🏁 Entrega final' };
  const desglose = {};
  d.ganadas.forEach(x => { const k = x._cat; desglose[k] = desglose[k] || { n:0, m:0 }; desglose[k].n++; desglose[k].m += parseFloat(x.OPPORTUNITY)||0; });

  // Detalle por negociación para el emergente: nombre, monto, kWp, % energía, inmueble y año
  const INMUEBLE_NOMBRE = { '1196':'Propio', '1198':'Rentado', '1200':'Familiar', '1202':'Empresarial' };
  const detDeal = x => ({
    t: x.TITLE || 'Negociación ' + x.ID,
    m: parseFloat(x.OPPORTUNITY) || 0,
    kwp: x.UF_CRM_1741208352117 || '',
    en: x.UF_CRM_1753209254287 ? (String(x.UF_CRM_1753209254287).includes('%') ? x.UF_CRM_1753209254287 : x.UF_CRM_1753209254287 + '%') : '',
    inm: INMUEBLE_NOMBRE[String(x.UF_CRM_1765995370491)] || '',
    y: fechaDeal(x).getFullYear()
  });
  const porMes = arr => {
    const m = Array(12).fill(0);
    const det = Array.from({ length: 12 }, () => []);
    arr.forEach(x => {
      const i = fechaDeal(x).getMonth();
      m[i] += parseFloat(x.OPPORTUNITY) || 0;
      det[i].push(detDeal(x));
    });
    return { m, det };
  };
  const { m: mesesV, det: detV } = porMes(vAnio);
  const { m: mesesC, det: detC } = porMes(cAnio);
  const maxMes = Math.max(...mesesV, ...mesesC, 1);

  const porVendedor = arr => {
    const v = {};
    arr.forEach(x => {
      const id = String(x.ASSIGNED_BY_ID);
      const m = parseFloat(x.OPPORTUNITY) || 0;
      v[id] = v[id] || { monto: 0, det: [] };
      v[id].monto += m;
      v[id].det.push(detDeal(x));
    });
    return Object.entries(v).map(([id, o]) => ({ nombre: USER_NAMES[id] || `Usuario ${id}`, monto: o.monto, det: o.det })).sort((a,b)=>b.monto-a.monto);
  };
  const vendVentas = porVendedor(vAnio);

function renderDirector() {

  cargarDirector();

async function cargarDirector() {
  const cont = document.getElementById('cont-dir');
  try {
    if (!_dirData) {
      async function tareasDir(filtro) {
        let ts = [], start = 0;
        while (true) {
          const r = await bxTask('tasks.task.list', {
            filter: filtro,
            select: ['ID','TITLE','STATUS','RESPONSIBLE_ID','CREATED_BY','DEADLINE','DESCRIPTION','CHANGED_DATE'],
            start
          });
          const pag = r.result?.tasks || [];
          ts = ts.concat(pag);
          if (!r.next || !pag.length || ts.length >= 2000) break;
          start = r.next;
        }
        return ts;
      }
      async function dealsDir(cat) {
        let ds = [], start = 0;
        while (true) {
          const r = await bx('crm.deal.list', {
            filter: { CATEGORY_ID: cat },
            select: ['ID','TITLE','STAGE_ID','OPPORTUNITY','ASSIGNED_BY_ID','DATE_MODIFY'],
            start
          });
          ds = ds.concat(r.result || []);
          if (!r.next) break;
          start = r.next;
        }
        return ds.filter(x => !String(x.STAGE_ID).endsWith('LOSE'));
      }
      const [tIng, tVis, tFin, tEquipo, d4, d6] = await Promise.all([
        tareasDir({ '%TITLE': 'propuesta', '@RESPONSIBLE_ID': [34, 86] }),
        tareasDir({ '%TITLE': 'VISITA T' }),
        tareasDir({ GROUP_ID: 30 }),
        tareasDir({ '@RESPONSIBLE_ID': [34, 86, 40, 344], '!STATUS': [5, 6] }),
        dealsDir(4), dealsDir(6)
      ]);
      _dirData = { tIng, tVis, tFin, tEquipo, d4, d6 };
    }
    pintarDirector();
  } catch(e) { console.warn('[dir]', e); cont.innerHTML = '<div class="empty-msg"><div class="empty-icono">⚠️</div><div class="empty-txt">Error al cargar el tablero.</div></div>'; }
}

function pintarDirector() {
  const cont = document.getElementById('cont-dir');
  const d = _dirData;
  const ahora = Date.now();
  const activa = t => t.status != 5 && t.status != 6;
  const vencida = t => activa(t) && t.deadline && new Date(t.deadline).getTime() < ahora;

  // ── Resumen operativo ──
  const ingAct = d.tIng.filter(activa), visAct = d.tVis.filter(activa), finAct = d.tFin.filter(activa);
  const porAprobar = d.tIng.filter(t => t.status == 3);

  // ── Cumplimiento (entregadas vs total, y vencidas activas) ──
  const cumpl = ts => {
    const total = ts.filter(t => t.status != 6).length;
    const ok = ts.filter(t => t.status == 5).length;
    const venc = ts.filter(vencida).length;
    return { total, ok, venc, pct: total ? Math.round(ok / total * 100) : 0 };

  const cIng = cumpl(d.tIng), cVis = cumpl(d.tVis), cFin = cumpl(d.tFin);

function iniciarEntregaFin(id) {
  const archivosEl = document.getElementById(`archivos-ej-${id}`);
  const tieneArchivos = (archivosEl && archivosEl.querySelector('.archivo-item')) ||
                        (window._archivosCache?.[id]?.length > 0);
  if (!tieneArchivos) { alert('Adjunta al menos un archivo del plan financiero antes de entregar.'); return; }
  const comentario = document.getElementById(`resumen-fin-${id}`)?.value?.trim();
  if (!comentario) { alert('Escribe un comentario para el vendedor.'); return; }
  document.getElementById(`conf-fin-${id}`).classList.add('visible');
}

async function ejecutarEntregaFin(id) {
  const btn = document.getElementById(`si-fin-${id}`);
  if (btn) { btn.disabled = true; btn.textContent = 'Entregando…'; }
  const comentario = document.getElementById(`resumen-fin-${id}`)?.value?.trim() || '';
  try {
    const archivos = window._archivosCache?.[id] || [];
    const linksArchivos = archivos.map(a => {
      const ext = (a.name.split('.').pop()||'').toUpperCase();
      const emoji = ext==='PDF'?'📕':['XLSX','XLS'].includes(ext)?'📗':'📎';
      return `${emoji} ${a.name}${a.downloadUrl ? `\n🔗 Descargar: ${a.downloadUrl}` : ''}`;
    }).join('\n\n');
    const msg = [`💰 PLAN FINANCIERO ENTREGADO`, comentario, linksArchivos, `— Erick Hernandez`].filter(Boolean).join('\n\n');
    await bx('task.commentitem.add', { TASKID: id, FIELDS: { POST_MESSAGE: msg } });
    // Marcar ===APROBADA=== en la tarea para que al vendedor le llegue la notificación
    // (mismo mecanismo que las propuestas de ingeniería)
    const tr = await bxTask('tasks.task.get', { taskId: id, select: ['DESCRIPTION'] });
    let descr = tr.result?.task?.description || '';
    descr = descr.replace(rxMarcaG('APROBADA'), '');
    const hoy = new Date().toISOString().slice(0,10);
    const lineasPdf = archivos.map(a => `${a.name}||${a.downloadUrl||''}`).join('\n');
    descr += `\n\n${marcaAbre('APROBADA')}\n${hoy}\n${lineasPdf}\n${marcaCierra('APROBADA')}`;
    await bxTask('tasks.task.update', { taskId: id, fields: { DESCRIPTION: descr } });
    await bxTask('tasks.task.complete', { taskId: id });
    if (window._archivosCache) delete window._archivosCache[id];
    exitoCard(`card-fin-${id}`, '✅ Plan financiero entregado al vendedor', '#f0fdf4', '#bbf7d0');
  } catch { alert('Error al entregar. Intenta de nuevo.'); document.getElementById(`conf-fin-${id}`)?.classList.remove('visible'); if (btn) { btn.disabled=false; btn.textContent='Sí, entregar'; } }
}

// Load only PDF files for revision card — resolve via disk.attachedObject.get
async function cargarArchivosRevision(tareaId, prefijo = 'archivos-rev') {
  const el = document.getElementById(`${prefijo}-${tareaId}`);
  if (!el) return;
  try {
    const r = await bxTask('tasks.task.get', { taskId: tareaId, select: ['UF_TASK_WEBDAV_FILES'] });
    const task = r.result?.task || {};
    const ufIds = (task.ufTaskWebdavFiles || task.UF_TASK_WEBDAV_FILES || []).filter(Boolean);
    const rows = await Promise.all(ufIds.map(async fid => {
      try {
        const ao = await bx('disk.attachedObject.get', { id: fid });
        let fileId = null;
        if (ao.result?.OBJECT_ID) {
          fileId = ao.result.OBJECT_ID;
        } else {
          fileId = fid;
        }
        const fr = await bx('disk.file.get', { id: fileId });
        const f = fr.result; if (!f) return null;
        const nombre = f.NAME || `Archivo #${fileId}`;
        const url = f.DOWNLOAD_URL || f.DETAIL_URL || '';
        const ext = (nombre.split('.').pop() || '').toUpperCase();
        const icono = ext==='PDF'?'📕':['PPTX','PPT'].includes(ext)?'📊':['XLSX','XLS'].includes(ext)?'📗':['DOCX','DOC'].includes(ext)?'📘':'📄';
        const isPdf = ext === 'PDF';
        return { html: `<div class="archivo-item" style="${isPdf?'border-color:#7c3aed;background:#faf5ff':''}">
          <span class="archivo-icono">${icono}</span>
          <div class="archivo-info">
            <div class="archivo-nombre">${nombre}${isPdf?' <span style="font-size:10px;color:#7c3aed;font-weight:700">PDF</span>':''}</div>
            ${url ? `<a href="${url}" target="_blank" class="archivo-link">Descargar →</a>` : ''}
          </div>
        </div>`, isPdf, nombre, url, fileId };
      } catch { return null; }
    }));
    let valid = rows.filter(Boolean);

    // Buscar en comentarios archivos subidos vía disk.folder.uploadfile (siempre, para complementar UF)
    {
      try {
        const cr = await bx('task.commentitem.getlist', { TASKID: tareaId, ORDER: { ID: 'ASC' }, FILTER: {} });
        const comments = cr.result || [];
        for (const c of comments) {
          const msg = c.POST_MESSAGE || c.postMessage || '';
          // Buscar cada línea de archivo: "📕 nombre.ext" seguida de "🔗 Descargar: url"
          // También soporta formato antiguo: "Archivo adjunto: nombre"
          const lineas = msg.split('\n');
          for (let li = 0; li < lineas.length; li++) {
            const linea = lineas[li].trim();
            // Buscar la URL de descarga en las 2 líneas siguientes
            const urlLinea = (lineas[li+1] || '') + ' ' + (lineas[li+2] || '');
            const urlMatch = urlLinea.match(/Descargar:\s*(https?:\/\/[^\s]+)/);
            if (!urlMatch) continue;
            // Extraer nombre: formato "📕 nombre.pdf" o "Archivo adjunto: nombre"
            const matchNuevo = linea.match(/Archivo adjunto:\s*(.+)/);
            // Intentar quitar el emoji del inicio (puede ser surrogate pair)
            const sinEmoji = linea.replace(/^\p{Emoji}\s*/u, '').trim();
            const nombre = matchNuevo ? matchNuevo[1].trim() : (sinEmoji.includes('.') ? sinEmoji : null);
            if (!nombre || !nombre.includes('.')) continue;
            const url = urlMatch[1].trim();
            // Evitar duplicados por nombre — normalizando el sufijo de timestamp
            // que agrega la subida ("archivo_2026-07-03-00-51-46.pdf" ≡ "archivo.pdf")
            const norm = n => (n||'').replace(/_\d{4}-\d{2}-\d{2}-\d{2}-\d{2}-\d{2}(?=\.\w+$)/,'').toLowerCase();
            if (valid.some(v => norm(v.nombre) === norm(nombre))) continue;
            const ext = (nombre.split('.').pop() || '').toUpperCase();
            const icono = ext==='PDF'?'📕':['PPTX','PPT'].includes(ext)?'📊':['XLSX','XLS'].includes(ext)?'📗':['DOCX','DOC'].includes(ext)?'📘':'📄';
            const isPdf = ext === 'PDF';
            valid.push({ html: `<div class="archivo-item" style="${isPdf?'border-color:#7c3aed;background:#faf5ff':''}">
              <span class="archivo-icono">${icono}</span>
              <div class="archivo-info">
                <div class="archivo-nombre">${nombre}${isPdf?' <span style="font-size:10px;color:#7c3aed;font-weight:700">PDF</span>':''}</div>
                ${url ? `<a href="${url}" target="_blank" class="archivo-link">Descargar →</a>` : ''}
              </div>
            </div>`, isPdf, nombre, url });
          }
        }
      } catch {}
    }

    if (!valid.length) { el.innerHTML = '<div style="font-size:12px;color:#9ca3af">Sin archivos adjuntos aún.</div>'; return; }
    // PDFs con checkbox para que Daniel elija cuáles publicar; el resto solo se lista
    const pdfs = valid.filter(v => v.isPdf);
    const otros = valid.filter(v => !v.isPdf);
    let html = '';
    if (pdfs.length) {
      html += pdfs.map((v, i) => `<label style="display:flex;align-items:center;gap:8px;cursor:pointer">
        <input type="checkbox" class="pdf-check-${tareaId}" data-name="${v.nombre.replace(/"/g,'&quot;')}" data-url="${(v.url||'').replace(/"/g,'&quot;')}" data-fileid="${v.fileId||''}" checked
          style="width:17px;height:17px;accent-color:#7c3aed;flex-shrink:0;cursor:pointer">
        <div style="flex:1;min-width:0">${v.html}</div>
      </label>`).join('');
      if (pdfs.length > 1) html = `<div style="font-size:11px;color:#7c3aed;font-weight:600;margin-bottom:6px">☑️ Marca las propuestas que se publicarán al aprobar</div>` + html;
    }
    html += otros.map(v => v.html).join('');
    el.innerHTML = html;
  } catch(e) { el.innerHTML = '<div style="font-size:12px;color:#ef4444">Error al cargar archivos.</div>'; }
}

        .replace(/\n/g, '<br>');

            // Fallback: intentar como attachedObject
            const ao = await bx('disk.attachedObject.get', { id: fileId });

              const fr2 = await bx('disk.file.get', { id: ao.result.OBJECT_ID });

              if (f2) {

async function getStorageParaTarea(tareaId) {
  // 1. Intentar con el grupo de la tarea específica
  try {
    const tRes = await bxTask('tasks.task.get', { taskId: tareaId, select: ['GROUP_ID'] });
    const gid = tRes.result?.task?.groupId || tRes.result?.task?.GROUP_ID;
    if (gid) {
      const sRes = await bx('disk.storage.getlist', { filter: { ENTITY_TYPE: 'group', ENTITY_ID: gid } });
      const s = sRes.result?.find?.(x => x.ROOT_OBJECT_ID);
      if (s) return { storage: s, groupId: gid };
    }
  } catch {}

  // 2. Grupo principal del proyecto
  try {
    const sRes = await bx('disk.storage.getlist', { filter: { ENTITY_TYPE: 'group', ENTITY_ID: PROJECT_ID } });
    const s = sRes.result?.find?.(x => x.ROOT_OBJECT_ID);
    if (s) return { storage: s, groupId: PROJECT_ID };
  } catch {}

  // 3. Listar TODOS los storages accesibles y tomar el primero válido
  try {
    const sRes = await bx('disk.storage.getlist', {});
    console.log('[storage] todos los disponibles:', sRes.result?.map(s => `${s.NAME} (${s.ENTITY_TYPE})`));
    const s = sRes.result?.find?.(x => x.ROOT_OBJECT_ID);
    if (s) return { storage: s, groupId: null };
  } catch {}

  // 4. Storage personal del usuario del webhook (ID 12)
  try {
    const sRes = await bx('disk.storage.getlist', { filter: { ENTITY_TYPE: 'user', ENTITY_ID: 12 } });
    const s = sRes.result?.find?.(x => x.ROOT_OBJECT_ID);
    if (s) return { storage: s, groupId: null };
  } catch {}

  throw new Error('Sin acceso a Disk. Verifica permisos del webhook.');
}

async function resolverArchivoId(fid) {
  // Intento 1: disk.file.get directo
  let r = await bx('disk.file.get', { id: fid });
  if (r.result) return r.result;

  // Intento 2: disk.attachedObject.get (IDs de archivos adjuntos nativos de Bitrix)
  const ao = await bx('disk.attachedObject.get', { id: fid });
  console.log(`[resolverArchivo] attachedObject id=${fid}:`, JSON.stringify(ao).substring(0,200));
  if (ao.result?.OBJECT) return ao.result.OBJECT;
  if (ao.result?.FILE)   return ao.result.FILE;
  // Si devuelve OBJECT_ID, buscar el archivo por ese ID
  const oid = ao.result?.OBJECT_ID || ao.result?.objectId;
  if (oid) {
    const fr = await bx('disk.file.get', { id: oid });
    if (fr.result) return fr.result;
  }

  // Intento 3: disk.object.get (otro tipo de objeto en Disk)
  const do2 = await bx('disk.object.get', { id: fid });
  if (do2.result) return do2.result;

  return null;
}

  const el = elOverride || document.getElementById(`${prefijo}-${tareaId}`);
  if (!el || !archivoIds?.length) return;
  const rows = await Promise.all(archivoIds.filter(Boolean).map(async fid => {
    try {
      const f = await resolverArchivoId(fid);
      if (!f) return null; // omitir IDs que no resuelven
      const nombre = f.NAME || f.name || `Archivo #${fid}`;
      const url = f.DOWNLOAD_URL || f.downloadUrl || f.DETAIL_URL || '';
      const ext = (nombre.split('.').pop() || '').toUpperCase();
      const icono = ext==='PDF'?'📕':['PPTX','PPT'].includes(ext)?'📊':['XLSX','XLS'].includes(ext)?'📗':['DOCX','DOC'].includes(ext)?'📘':'📄';
      return `<div class="archivo-item">
        <span style="font-size:18px">${icono}</span>
        <span class="archivo-nombre" ${url?`onclick="window.open('${url}','_blank')"`:``}>${nombre}</span>
        ${url?`<span style="font-size:11px;color:#0369a1;flex-shrink:0">↓</span>`:`<span style="font-size:11px;color:#9ca3af;flex-shrink:0">${ext||'?'}</span>`}
      </div>`;
    } catch { return null; }
  }));
  const valid = rows.filter(Boolean);
  el.innerHTML = valid.join('') || '<div style="font-size:12px;color:#9ca3af">Sin archivos aún.</div>';
}

// ── Vincular archivo al deal CRM ───────────────────────────────────────────
async function vincularArchivoADeal(parentTaskId, fileName, downloadUrl) {
  if (!parentTaskId) return;
  try {
    const pr = await bxTask('tasks.task.get', { taskId: parentTaskId, select: ['UF_CRM_TASK','TITLE'] });
    const pt = pr.result?.task;
    if (!pt) return;
    const crmLinks = pt.ufCrmTask || pt.UF_CRM_TASK || [];
    const links = (Array.isArray(crmLinks) ? crmLinks : [crmLinks]).filter(Boolean).map(String);
    console.log('[CRM] UF_CRM_TASK links:', links);

    // Bitrix puede devolver "D_123", "CRM_DEAL_123" o simplemente "123"
    const dealId = (() => {
      const d = links.find(s => /^D_\d+$/.test(s));
      if (d) return d.replace('D_', '');
      const c = links.find(s => /CRM_DEAL_\d+/i.test(s));
      if (c) return c.match(/\d+/)[0];
      const n = links.find(s => /^\d+$/.test(s));
      return n || null;
    })();

    if (!dealId) { console.log('[CRM] No se encontró deal ID en:', links); return; }

    const propuestaTitulo = pt.title || pt.TITLE || 'propuesta';
    const linkTexto = downloadUrl ? `\n\n🔗 Descargar: ${downloadUrl}` : '';

    const r = await bx('crm.timeline.comment.add', {
      fields: {
        ENTITY_ID: parseInt(dealId),
        ENTITY_TYPE: 'deal',
        COMMENT: `📎 Propuesta lista para compartir al cliente\n\nArchivo: ${fileName}${linkTexto}\n\nPropuesta: ${propuestaTitulo}`
      }
    });
    console.log(`[CRM] Timeline deal #${dealId}:`, r);
  } catch(e) { console.warn('[CRM] Error vinculando al deal:', e); }
}

function exitoCard(cardId, msg, bg, border) {
  const card = document.getElementById(cardId);
  if (!card) return;
  card.style.background = bg;
  card.style.borderColor = border;
  card.innerHTML = `<div style="padding:10px 0;font-size:14px;font-weight:700;color:#15803d">${msg}</div>`;
  setTimeout(() => card.remove(), 2500);
}
