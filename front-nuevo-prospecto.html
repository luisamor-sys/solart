<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Nuevo Prospecto — SOLART</title>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
    background: #f4f6f9;
    min-height: 100vh;
    display: flex;
    align-items: flex-start;
    justify-content: center;
    padding: 24px 16px;
  }

  .card {
    background: #fff;
    border-radius: 16px;
    box-shadow: 0 2px 16px rgba(0,0,0,0.08);
    padding: 32px 28px;
    width: 100%;
    max-width: 480px;
  }

  .logo {
    display: flex;
    align-items: center;
    gap: 10px;
    margin-bottom: 28px;
  }

  .logo-icon {
    width: 36px;
    height: 36px;
    background: #f59e0b;
    border-radius: 8px;
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 18px;
  }

  .logo-text {
    font-size: 18px;
    font-weight: 700;
    color: #1a1a2e;
  }

  h1 {
    font-size: 22px;
    font-weight: 700;
    color: #1a1a2e;
    margin-bottom: 6px;
  }

  .subtitle {
    font-size: 14px;
    color: #6b7280;
    margin-bottom: 28px;
  }

  .field {
    margin-bottom: 18px;
  }

  label {
    display: block;
    font-size: 13px;
    font-weight: 600;
    color: #374151;
    margin-bottom: 6px;
  }

  label .req {
    color: #ef4444;
    margin-left: 2px;
  }

  input {
    width: 100%;
    padding: 12px 14px;
    border: 1.5px solid #e5e7eb;
    border-radius: 10px;
    font-size: 15px;
    color: #1a1a2e;
    transition: border-color 0.2s;
    outline: none;
    background: #fafafa;
  }

  input:focus {
    border-color: #f59e0b;
    background: #fff;
  }

  input.error {
    border-color: #ef4444;
  }

  .error-msg {
    font-size: 12px;
    color: #ef4444;
    margin-top: 4px;
    display: none;
  }

  .error-msg.visible {
    display: block;
  }

  .btn {
    width: 100%;
    padding: 15px;
    background: #f59e0b;
    color: #fff;
    border: none;
    border-radius: 12px;
    font-size: 16px;
    font-weight: 700;
    cursor: pointer;
    margin-top: 8px;
    transition: background 0.2s, transform 0.1s;
    letter-spacing: 0.3px;
  }

  .btn:hover { background: #d97706; }
  .btn:active { transform: scale(0.98); }
  .btn:disabled { background: #d1d5db; cursor: not-allowed; transform: none; }

  /* Estados */
  .estado { display: none; text-align: center; padding: 20px 0; }
  .estado.visible { display: block; }

  .spinner {
    width: 44px; height: 44px;
    border: 4px solid #f3f3f3;
    border-top: 4px solid #f59e0b;
    border-radius: 50%;
    animation: spin 0.8s linear infinite;
    margin: 0 auto 16px;
  }
  @keyframes spin { to { transform: rotate(360deg); } }

  .estado-texto {
    font-size: 15px;
    color: #6b7280;
  }

  .exito-icono {
    font-size: 52px;
    margin-bottom: 12px;
  }

  .exito-titulo {
    font-size: 20px;
    font-weight: 700;
    color: #1a1a2e;
    margin-bottom: 6px;
  }

  .exito-sub {
    font-size: 14px;
    color: #6b7280;
    margin-bottom: 24px;
  }

  .btn-secundario {
    width: 100%;
    padding: 13px;
    background: transparent;
    color: #f59e0b;
    border: 2px solid #f59e0b;
    border-radius: 12px;
    font-size: 15px;
    font-weight: 600;
    cursor: pointer;
    transition: background 0.2s;
  }

  .btn-secundario:hover { background: #fef3c7; }

  .error-general {
    background: #fef2f2;
    border: 1px solid #fecaca;
    border-radius: 10px;
    padding: 14px;
    font-size: 14px;
    color: #dc2626;
    margin-bottom: 16px;
    display: none;
  }

  .error-general.visible { display: block; }
</style>
</head>
<body>

<div class="card">

  <div style="margin-bottom:14px">
    <a target="_top" href="https://luisamor-sys.github.io/solart/front-home.html" style="display:inline-flex;align-items:center;gap:6px;font-size:13px;font-weight:700;color:#6b7280;text-decoration:none;background:#f3f4f6;padding:7px 12px;border-radius:10px">← Menú</a>
  </div>

  <!-- LOGO -->
  <div class="logo">
    <div class="logo-icon">☀️</div>
    <span class="logo-text">SOLART</span>
  </div>

  <!-- FORMULARIO -->
  <div id="vista-form">
    <h1>Nuevo prospecto</h1>
    <p class="subtitle">Llena los datos y listo — el CRM hace el resto.</p>

    <div class="error-general" id="error-general"></div>

    <div class="field">
      <label>Nombre <span class="req">*</span></label>
      <input type="text" id="nombre" placeholder="Ej. María" autocomplete="given-name">
      <div class="error-msg" id="err-nombre">Escribe el nombre</div>
    </div>

    <div class="field">
      <label>Apellido <span class="req">*</span></label>
      <input type="text" id="apellido" placeholder="Ej. González" autocomplete="family-name">
      <div class="error-msg" id="err-apellido">Escribe el apellido</div>
    </div>

    <div class="field">
      <label>Teléfono <span class="req">*</span></label>
      <input type="tel" id="telefono" placeholder="Ej. 8121234567" maxlength="15" autocomplete="tel">
      <div class="error-msg" id="err-telefono">Escribe un teléfono válido</div>
    </div>

    <div class="field">
      <label>Email</label>
      <input type="email" id="email" placeholder="Ej. maria@empresa.com" autocomplete="email">
      <div class="error-msg" id="err-email">Escribe un email válido</div>
    </div>

    <div class="field">
      <label>Empresa <span class="req">*</span></label>
      <input type="text" id="empresa" placeholder="Ej. Constructora Norte" autocomplete="organization">
      <div class="error-msg" id="err-empresa">Escribe el nombre de la empresa</div>
    </div>

    <button class="btn" id="btn-guardar" onclick="guardarProspecto()">
      Guardar prospecto
    </button>
  </div>

  <!-- CARGANDO -->
  <div class="estado" id="vista-cargando">
    <div class="spinner"></div>
    <div class="estado-texto">Registrando en el CRM…</div>
  </div>

  <!-- ÉXITO -->
  <div class="estado" id="vista-exito">
    <div class="exito-icono">✅</div>
    <div class="exito-titulo">¡Prospecto registrado!</div>
    <div class="exito-sub" id="exito-nombre"></div>
    <button class="btn" onclick="nuevoProspecto()">Agregar otro prospecto</button>
    <br><br>
    <button class="btn-secundario" onclick="window.open('https://crm-solart.bitrix24.mx/crm/leads/', '_blank')">
      Ver en CRM
    </button>
  </div>

</div>

<script>
  const WEBHOOK = 'https://crm-solart.bitrix24.mx/rest/12/128t1gaxhgz3aoue/';
  const ETAPA_ENTRADA = 'NEW'; // 04_Contacto comercial inicial

  function mostrar(id) {
    ['vista-form', 'vista-cargando', 'vista-exito'].forEach(v => {
      document.getElementById(v).classList.remove('visible');
    });
    document.getElementById(id).classList.add('visible');
  }

  function limpiarErrores() {
    document.querySelectorAll('.error-msg').forEach(e => e.classList.remove('visible'));
    document.querySelectorAll('input').forEach(i => i.classList.remove('error'));
    document.getElementById('error-general').classList.remove('visible');
  }

  function marcarError(campoId, errId) {
    document.getElementById(campoId).classList.add('error');
    document.getElementById(errId).classList.add('visible');
  }

  function validar() {
    limpiarErrores();
    let ok = true;
    const nombre   = document.getElementById('nombre').value.trim();
    const apellido = document.getElementById('apellido').value.trim();
    const telefono = document.getElementById('telefono').value.trim();
    const email    = document.getElementById('email').value.trim();
    const empresa  = document.getElementById('empresa').value.trim();

    if (!nombre)   { marcarError('nombre', 'err-nombre'); ok = false; }
    if (!apellido) { marcarError('apellido', 'err-apellido'); ok = false; }
    if (!telefono || telefono.length < 8) { marcarError('telefono', 'err-telefono'); ok = false; }
    if (email && !/^[^\s@]+@[^\s@]+\.[^\s@]+$/.test(email)) { marcarError('email', 'err-email'); ok = false; }
    if (!empresa)  { marcarError('empresa', 'err-empresa'); ok = false; }

    return ok;
  }

  async function guardarProspecto() {
    if (!validar()) return;

    const nombre   = document.getElementById('nombre').value.trim();
    const apellido = document.getElementById('apellido').value.trim();
    const telefono = document.getElementById('telefono').value.trim();
    const email    = document.getElementById('email').value.trim();
    const empresa  = document.getElementById('empresa').value.trim();

    document.getElementById('btn-guardar').disabled = true;
    mostrar('vista-cargando');

    const campos = {
      NAME: nombre,
      LAST_NAME: apellido,
      PHONE: [{ VALUE: telefono, VALUE_TYPE: 'WORK' }],
      COMPANY_TITLE: empresa,
      STATUS_ID: ETAPA_ENTRADA,
      SOURCE_ID: 'SELF'
    };

    // Responsable = usuario loggeado (sin esto queda a nombre del webhook, Luis Amor)
    try {
      const u = JSON.parse(localStorage.getItem('solart_user'));
      if (u?.id) campos.ASSIGNED_BY_ID = u.id;
    } catch {}

    if (email) {
      campos.EMAIL = [{ VALUE: email, VALUE_TYPE: 'WORK' }];
    }

    try {
      const res = await fetch(WEBHOOK + 'crm.lead.add.json', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ fields: campos })
      });

      const data = await res.json();

      if (data.result) {
        document.getElementById('exito-nombre').textContent =
          nombre + ' ' + apellido + ' — ' + empresa;
        mostrar('vista-exito');
      } else {
        throw new Error(data.error_description || 'Error desconocido');
      }
    } catch (err) {
      mostrar('vista-form');
      const eg = document.getElementById('error-general');
      eg.textContent = 'No se pudo guardar. Intenta de nuevo. (' + err.message + ')';
      eg.classList.add('visible');
      document.getElementById('btn-guardar').disabled = false;
    }
  }

  function nuevoProspecto() {
    document.querySelectorAll('input').forEach(i => i.value = '');
    limpiarErrores();
    document.getElementById('btn-guardar').disabled = false;
    mostrar('vista-form');
  }

  // Permitir Enter para enviar
  document.addEventListener('keydown', e => {
    if (e.key === 'Enter' && document.getElementById('vista-form').classList.contains('visible')) {
      guardarProspecto();
    }
  });
</script>

</body>
</html>
